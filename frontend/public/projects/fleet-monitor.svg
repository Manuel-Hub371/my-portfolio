  <line x1="155" y1="205" x2="455" y2="205" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="155" y1="180" x2="455" y2="180" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
